<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificare distanță obiective</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    #app {
      display: flex;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    #sidebar {
      width: 340px;
      min-width: 340px;
      background: #ffffff;
      border-right: 1px solid #ddd;
      padding: 16px;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 2;
    }

    #map {
      flex: 1;
      height: 100%;
      min-width: 0;
    }

    h1 {
      margin: 0 0 16px 0;
      font-size: 22px;
    }

    label {
      display: block;
      margin: 10px 0 4px;
      font-size: 13px;
      font-weight: 600;
      color: #222;
    }

    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #cfcfcf;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      border: none;
      font-weight: 700;
    }

    .btn-primary {
      background: #1d4ed8;
      color: white;
      margin-top: 12px;
    }

    .btn-secondary {
      background: #4b5563;
      color: white;
      margin-top: 8px;
    }

    .legend, .result-box {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 4px 0;
      font-size: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .orange { background: orange; }
    .red { background: red; }
    .blue { background: #2563eb; }
    .dark { background: #333; }
    .green { background: #16a34a; }
    .yellow { background: #facc15; }

    .status-ok { color: #15803d; font-weight: 700; }
    .status-bad { color: #dc2626; font-weight: 700; }

    .muted { color: #666; font-size: 12px; }
    .small { font-size: 12px; line-height: 1.4; }
    .error { color: #dc2626; font-weight: 700; }

    /* MOBILE */
    @media (max-width: 768px) {
      #app {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        min-width: 100%;
        height: 40vh;
        border-right: none;
        border-bottom: 1px solid #ddd;
        padding: 10px;
      }

      #map {
        height: 60vh;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="sidebar">
      <h1>Verificare</h1>

      <input id="address" placeholder="Adresă..." />

      <label>Categorie</label>
      <select id="category">
        <option value="ambele">Ambele</option>
        <option value="biserici">Biserici</option>
        <option value="scoli">Școli</option>
      </select>

      <label>Prag</label>
      <select id="threshold">
        <option value="100">100 m</option>
        <option value="150" selected>150 m</option>
        <option value="200">200 m</option>
        <option value="300">300 m</option>
      </select>

      <button class="btn-primary" onclick="checkDistance()">Verifică</button>
      <button class="btn-secondary" onclick="toggleStreetView()">Street</button>

      <div class="result-box" id="resultBox">
        <div class="muted">Rezultatul apare aici</div>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script>
    let map, panorama;
    let addressMarker, nearestMarker, walkingPolyline;

    async function loadConfig() {
      const res = await fetch("/api/config");
      const data = await res.json();

      const script = document.createElement("script");
      script.src = `https://maps.googleapis.com/maps/api/js?key=${data.googleMapsApiKey}&libraries=geometry`;
      script.async = true;
      document.head.appendChild(script);

      return new Promise(resolve => {
        script.onload = resolve;
      });
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 44.43, lng: 26.10 },
        zoom: 13
      });

      panorama = map.getStreetView();
    }

    function clearMap() {
      if (addressMarker) addressMarker.setMap(null);
      if (nearestMarker) nearestMarker.setMap(null);
      if (walkingPolyline) walkingPolyline.setMap(null);
    }

    function render(data) {
      clearMap();

      const origin = { lat: data.origin.lat, lng: data.origin.lng };

      map.setCenter(origin);
      map.setZoom(17);

      addressMarker = new google.maps.Marker({
        position: origin,
        map,
        icon: "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
      });

      if (data.nearest) {
        nearestMarker = new google.maps.Marker({
          position: { lat: data.nearest.lat, lng: data.nearest.lon },
          map,
          icon: "http://maps.google.com/mapfiles/ms/icons/orange-dot.png"
        });
      }

      if (data.walking && data.walking.polyline) {
        const path = google.maps.geometry.encoding.decodePath(data.walking.polyline);

        walkingPolyline = new google.maps.Polyline({
          path,
          map,
          strokeColor: "#facc15",
          strokeWeight: 5
        });
      }

      document.getElementById("resultBox").innerHTML = `
        <div><b>${data.verdict}</b></div>
        ${data.nearest ? `
          <div class="small">${data.nearest.name}</div>
          <div class="small">Direct: ${Math.round(data.nearest.distanceMeters)} m</div>
          <div class="small">Pietonal: ${data.walking?.distanceText || "-"}</div>
        ` : "Nu există"}
      `;
    }

    async function checkDistance() {
      const address = document.getElementById("address").value;
      const category = document.getElementById("category").value;
      const threshold = document.getElementById("threshold").value;

      const res = await fetch("/api/check-distance", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ address, category, threshold })
      });

      const data = await res.json();
      render(data);
    }

    function toggleStreetView() {
      if (!addressMarker) return;

      const visible = panorama.getVisible();
      if (visible) {
        panorama.setVisible(false);
      } else {
        panorama.setPosition(addressMarker.getPosition());
        panorama.setVisible(true);
      }
    }

    async function start() {
      await loadConfig();
      initMap();
    }

    start();
  </script>
</body>
</html>
